name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23.x'
  NODE_VERSION: '20'

defaults:
  run:
    shell: bash

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Lint GitHub workflow files
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

  ci-contract:
    name: CI Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CI contract targets
        run: make verify-ci-contract

  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go formatting, vet, and staticcheck
        run: make quality-go

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend quality suite
        run: make ci-quality-frontend

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go test suite (race + coverage gate)
        run: make ci-test-go

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend test suite
        run: make ci-test-frontend

  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs:
      - go-quality
      - frontend-quality
      - go-tests
      - frontend-tests
      - workflow-lint
      - ci-contract
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe_suffix: ''
            desktop_target: ci-build-desktop-linux
          - os: macos-latest
            exe_suffix: ''
            desktop_target: ci-build-desktop
          - os: windows-latest
            exe_suffix: '.exe'
            desktop_target: ci-build-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install make on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install make --yes
          make --version

      - name: Build CLI binaries
        run: make ci-build-cli CLI_EXE_SUFFIX=${{ matrix.exe_suffix }}

      - name: Build desktop app
        run: make ${{ matrix.desktop_target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coldmic-${{ matrix.os }}
          path: build/bin/
          if-no-files-found: error
